<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Page</title>
  <style>
    :root {
    --brand-color: #2563eb;
    --bg-soft: #fcfcfd;
    --accent-gold: #c5a059;
    --text-dark: #2d3436;
    --soft-input-bg: #f8f9fa;
    }
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    color: #1f2937;
    transition: background 0.25s ease, color 0.25s ease;
  }

  .page {
    max-width: 900px;
    margin: 40px auto;
    padding: 24px;
  }

  .hero {
    text-align: center;
    margin-bottom: 28px;
  }

  .hero h1 {
    margin: 0 0 10px;
    font-size: 32px;
  }

  .hero p {
    margin: 0;
    color: #6b7280;
    font-size: 16px;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .full-width {
    grid-column: 1 / -1;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    font-size: 14px;
  }

  input, select, button {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 15px;
  }

  input:focus, select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }

  button {
    cursor: pointer;
    border: none;
    background: var(--brand-color);
    color: white;
    font-weight: bold;
    transition: 0.2s ease;
  }

  button:hover {
    background: #1d4ed8;
  }

  button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  .secondary-btn {
    background: #0f172a;
  }

  .secondary-btn:hover {
    background: #111827;
  }

  .slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 12px;
  }

  .slot-btn {
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    background: #fff;
    color: #111827;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .slot-btn:hover {
    border-color: var(--brand-color);
    background: #f8fafc;
  }

  .slot-btn.selected {
    background: var(--brand-color);
    color: white;
    border-color: var(--brand-color);
  }

  .section-title {
    margin: 0 0 14px;
    font-size: 18px;
  }

  .message {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: 12px;
    font-weight: 600;
  }

  .success {
    background: #dcfce7;
    color: #166534;
  }

  .error {
    background: #fee2e2;
    color: #991b1b;
  }

  .footer-note {
    margin-top: 18px;
    color: #6b7280;
    font-size: 13px;
    text-align: center;
  }

  @media (max-width: 720px) {
    input[type="date"] {
      width: 100%;
      min-width: 0;
      appearance: none;
      -webkit-appearance: none;
      font-size: 16px;
      padding: 10px 12px;
    }

    select,
    input,
    button {
      min-width: 0;
    }

    .card {
      padding: 16px;
    }

    .grid {
      gap: 12px;
    }
    .page {
      margin: 20px auto;
      padding: 16px;
    }

    .grid {
      grid-template-columns: 1fr;
    }

    .slots {
      grid-template-columns: repeat(2, 1fr);
    }

    .hero h1 {
      font-size: 26px;
    }

    .logo-container img {
  max-width: 110px;
  max-height: 110px;
}

.business-links {
  justify-content: stretch;
}

.business-link {
  width: 100%;
  text-align: center;
}

}
  .logo-container {
  margin-bottom: 16px;
}

.logo-container img {
  max-width: 140px;
  max-height: 140px;

}

.business-links {

.business-link {

<body>
  <div class="page">
  <div class="hero">
  <div id="logoContainer" class="logo-container" style="display: none;">
    <img id="businessLogo" alt="Logo do negócio" />
  </div>

  <h1 id="pageTitle">Marcar serviço</h1>
  <p id="heroSubtitle">Escolhe o serviço, a data e o horário que te for mais conveniente.</p>
</div>

<div class="card" id="bookingCard">

  <label id="providerLabel" for="provider">Prestador</label>
  <select id="provider"></select>

  <label id="serviceLabel" for="service">Serviço</label>
  <select id="service"></select>

  <label id="dateLabel" for="date">Data</label>
  <input type="date" id="date" />

  <button id="loadSlotsBtn">Ver horários disponíveis</button>

  <div id="slotsContainer" class="slots"></div>

  <label id="nameLabel" for="name">Nome</label>
  <input type="text" id="name" placeholder="O seu nome" />

  <label id="emailLabel" for="email">Email</label>
  <input type="email" id="email" placeholder="O seu email" />

  <button id="bookBtn">Confirmar marcação</button>

  <div id="message"></div>
  
  <div id="businessLinks" class="business-links" style="display: none;">
    <a id="phoneLink" class="business-link" href="#" target="_blank" style="display: none;"></a>
    <a id="instagramLink" class="business-link" href="#" target="_blank" style="display: none;"></a>
    <a id="facebookLink" class="business-link" href="#" target="_blank" style="display: none;"></a>
    <a id="websiteLink" class="business-link" href="#" target="_blank" style="display: none;"></a>
  </div>

  <div id="footerNote" class="footer-note">
    Após a confirmação, receberás um convite por email.
  </div>

  <script>

  const providerSelect = document.getElementById("provider");
  const serviceSelect = document.getElementById("service");
  const dateInput = document.getElementById("date");
  const loadSlotsBtn = document.getElementById("loadSlotsBtn");
  const slotsContainer = document.getElementById("slotsContainer");
  const nameInput = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const bookBtn = document.getElementById("bookBtn");
  const messageDiv = document.getElementById("message");
  const bookingCard = document.getElementById("bookingCard");

  const providerLabel = document.getElementById("providerLabel");
  const serviceLabel = document.getElementById("serviceLabel");
  const dateLabel = document.getElementById("dateLabel");
  const nameLabel = document.getElementById("nameLabel");
  const emailLabel = document.getElementById("emailLabel");
  const footerNote = document.getElementById("footerNote");

  const pageTitle = document.getElementById("pageTitle");

  let selectedSlot = null;
  
  let publicConfig = null;
  
  function t(key, fallback) {
    return publicConfig?.texts?.[key] || fallback;
  }

  function applyTemplateStyles(templateKey) {
    document.body.classList.remove(
      "template-default",
      "template-2",
      "template-3",
      "template-4",
      "template-5"
    );

    switch (templateKey) {
      case "template_2":
        document.body.classList.add("template-2");
        break;
      case "template_3":
        document.body.classList.add("template-3");
        break;
      case "template_4":
        document.body.classList.add("template-4");
        break;
      case "template_5":
        document.body.classList.add("template-5");
        break;
      default:
        document.body.classList.add("template-default");
        break;
    }
  }

  function setButtonText(button, textKey, fallback) {
    if (!button) return;
    button.textContent = t(textKey, fallback);
  }
  const urlParams = new URLSearchParams(window.location.search);
  const tenantKey = urlParams.get("tenant") || "default";

  const logoContainer = document.getElementById("logoContainer");
  const businessLogo = document.getElementById("businessLogo");
  const heroSubtitle = document.getElementById("heroSubtitle");

  const businessLinks = document.getElementById("businessLinks");
  const phoneLink = document.getElementById("phoneLink");
  const instagramLink = document.getElementById("instagramLink");
  const facebookLink = document.getElementById("facebookLink");
  const websiteLink = document.getElementById("websiteLink");

  function getApiBase() {
    const host = window.location.hostname;

    if (host === "127.0.0.1" || host === "localhost") {
      return "http://127.0.0.1:8000";
    }

    return "https://gadgetprelude.onrender.com";
  }

  const API_BASE = getApiBase();

  function showMessage(text, type) {
    messageDiv.className = `message ${type}`;
    messageDiv.innerHTML = text;
  }

  function clearMessage() {
    messageDiv.className = "";
    messageDiv.innerHTML = "";
  }

  function clearSlots() {
    slotsContainer.innerHTML = "";
    selectedSlot = null;
  }

  function setTodayAsMinDate() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    dateInput.min = `${yyyy}-${mm}-${dd}`;
  }

  function getTemplateIcons(templateKey) {
    const defaultIcons = {
      phone: "📞",
      instagram: "📷",
      facebook: "📘",
      website: "🌐"
    };

    const template2Icons = {
      phone: "📞",
      instagram: "📷",
      facebook: "📘",
      website: "🌐"
    };

    if (templateKey === "template_2") {
      return template2Icons;
    }

    return defaultIcons;
  }

  async function loadConfig() {
    const res = await fetch(`${API_BASE}/public/config?tenant_key=${encodeURIComponent(tenantKey)}`);
    const data = await res.json();
    const icons = getTemplateIcons(data.template_key || "default");
    const texts = data.texts || {};

    if (!res.ok) {
        throw new Error(data.detail || "Erro ao carregar configuração pública.");
    }

    publicConfig = data;

    applyTemplateStyles(data.template_key || "default");
    
    if (data.business_name) {
      document.title = texts.page_title
        ? `${texts.page_title} - ${data.business_name}`
        : `Marcar serviço - ${data.business_name}`;
    }

    pageTitle.textContent = texts.page_title || "Marcar serviço";
    heroSubtitle.textContent = data.subtitle || "Escolhe o serviço, a data e o horário que te for mais conveniente.";

    if (data.primary_color) {
      document.documentElement.style.setProperty("--brand-color", data.primary_color);
    }

    if (data.background_color) {
      document.body.style.background = data.background_color;
    }

    if (data.text_color) {
      document.body.style.color = data.text_color;
    }

    if (data.card_background_color) {
      bookingCard.style.background = data.card_background_color;
    }

    providerLabel.textContent = texts.provider_label || "Prestador";
    serviceLabel.textContent = texts.service_label || "Serviço";
    dateLabel.textContent = texts.date_label || "Data";
    nameLabel.textContent = texts.name_label || "Nome";
    emailLabel.textContent = texts.email_label || "Email";

    nameInput.placeholder = texts.name_placeholder || "O seu nome";
    emailInput.placeholder = texts.email_placeholder || "O seu email";

    loadSlotsBtn.textContent = texts.load_slots_button || "Ver horários disponíveis";
    bookBtn.textContent = texts.book_button || "Confirmar marcação";

    footerNote.textContent = texts.footer_note || "Após a confirmação, receberás um convite por email.";


    if (data.logo_url) {
      businessLogo.src = data.logo_url;
      logoContainer.style.display = "block";
    } else {
      logoContainer.style.display = "none";
    }

    let hasLinks = false;

    if (data.phone) {
      phoneLink.href = `tel:${data.phone}`;
      phoneLink.innerHTML = icons.phone;
      phoneLink.title = "Telefone";
      phoneLink.style.display = "inline-block";
      hasLinks = true;
    } else {
      phoneLink.style.display = "none";
    }

    if (data.instagram_url) {
      instagramLink.href = data.instagram_url;
      instagramLink.innerHTML = icons.instagram;
      instagramLink.title = "Instagram";
      instagramLink.style.display = "inline-block";
      hasLinks = true;
    } else {
      instagramLink.style.display = "none";
    }

    if (data.facebook_url) {
      facebookLink.href = data.facebook_url;
      facebookLink.innerHTML = icons.facebook;
      facebookLink.title = "Facebook";
      facebookLink.style.display = "inline-block";
      hasLinks = true;
    } else {
      facebookLink.style.display = "none";
    }

    if (data.website_url) {
      websiteLink.href = data.website_url;
      websiteLink.innerHTML = icons.website;
      websiteLink.title = "Website";
      websiteLink.style.display = "inline-block";
      hasLinks = true;
    } else {
      websiteLink.style.display = "none";
    }

    businessLinks.style.display = hasLinks ? "flex" : "none";
  }

  async function loadProviders() {
    clearMessage();

    const res = await fetch(`${API_BASE}/public/providers?tenant_key=${encodeURIComponent(tenantKey)}`);
    const providers = await res.json();

    if (!res.ok) {
      throw new Error("Erro ao carregar prestadores.");
    }

    providerSelect.innerHTML = "";

    const placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = `Escolhe um ${t("provider_label", "prestador").toLowerCase()}`;
    providerSelect.appendChild(placeholder);

    providers.forEach(provider => {
      const option = document.createElement("option");
      option.value = provider.id;
      option.textContent = provider.name;
      providerSelect.appendChild(option);
    });

    providerSelect.value = "";
  }

  async function loadServices() {
    const providerId = providerSelect.value;

    serviceSelect.innerHTML = "";
    slotsContainer.innerHTML = "";
    selectedSlot = null;

    const defaultOption = document.createElement("option");
    defaultOption.value = "";
    defaultOption.textContent = "Escolhe primeiro um prestador";
    serviceSelect.appendChild(defaultOption);

    if (!providerId) {
      return;
    }

    try {
      const res = await fetch(
        `${API_BASE}/public/services?tenant_key=${encodeURIComponent(tenantKey)}&provider_id=${encodeURIComponent(providerId)}`
      );
      const data = await res.json();

      console.log("SERVICES RESPONSE:", data);

      if (!res.ok) {
        showMessage(data.detail || "Erro ao carregar serviços.", "error");
        return;
      }

      if (!Array.isArray(data)) {
        showMessage("Resposta inválida ao carregar serviços.", "error");
        return;
      }

      serviceSelect.innerHTML = "";

      const placeholderOption = document.createElement("option");
      placeholderOption.value = "";
      placeholderOption.textContent = "Escolhe um serviço";
      serviceSelect.appendChild(placeholderOption);

      data.forEach(service => {
        const option = document.createElement("option");
        option.value = service.id;
        option.textContent = service.name;
        serviceSelect.appendChild(option);
      });

    } catch (error) {
      console.error("Erro real em loadServices:", error);
      showMessage("Erro de ligação ao carregar serviços.", "error");
    }
  }

  async function loadAvailability() {
    clearMessage();
    clearSlots();

    const providerId = providerSelect.value;
    const serviceId = serviceSelect.value;
    const dateStr = dateInput.value;

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    const todayStr = `${yyyy}-${mm}-${dd}`;

    if (dateStr < todayStr) {
      showMessage(t("validation_past_date", "Não podes escolher uma data no passado."), "error");
      return;
    }

    if (!providerId) {
      showMessage(t("validation_select_provider", "Escolhe um prestador."), "error");
      return;
    }

    if (!serviceId || !dateStr) {
      showMessage(t("validation_select_service_date", "Escolhe um serviço e uma data."), "error");
      return;
    }

    loadSlotsBtn.disabled = true;
    setButtonText(loadSlotsBtn, "loading_slots_button", "A carregar horários...");

    try {
      const url = `${API_BASE}/public/availability?tenant_key=${encodeURIComponent(tenantKey)}&provider_id=${encodeURIComponent(providerId)}&service_id=${encodeURIComponent(serviceId)}&date=${encodeURIComponent(dateStr)}`;

      const res = await fetch(url);
      const data = await res.json();

      console.log("AVAILABILITY RESPONSE:", data);

      if (!res.ok) {
        console.error("Resposta backend availability:", data);
        showMessage(data.detail || "Erro ao carregar disponibilidade.", "error");
        return;
      }

      if (!data.slots || data.slots.length === 0) {
        showMessage("Não existem horários disponíveis para essa data.", "error");
        return;
      }

      data.slots.forEach(slot => {
        const btn = document.createElement("button");
        btn.className = "slot-btn";
        btn.type = "button";

        const dt = new Date(slot);
        btn.textContent = dt.toLocaleTimeString("pt-PT", {
          hour: "2-digit",
          minute: "2-digit"
        });

        btn.addEventListener("click", () => {
          document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          selectedSlot = slot;
          clearMessage();
        });

        slotsContainer.appendChild(btn);
      });
    } catch (error) {
      console.error("Erro real em loadAvailability:", error);
      showMessage("Erro de ligação ao servidor ao carregar horários.", "error");
    } finally {
      loadSlotsBtn.disabled = false;
      setButtonText(loadSlotsBtn, "load_slots_button", "Ver horários disponíveis");
    }
  }

  async function bookAppointment() {
    clearMessage();

    const providerId = parseInt(providerSelect.value, 10);
    const serviceId = parseInt(serviceSelect.value, 10);
    const customerName = nameInput.value.trim();
    const customerEmail = emailInput.value.trim();
    const selectedDate = selectedSlot ? selectedSlot.slice(0, 10) : null;

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    const todayStr = `${yyyy}-${mm}-${dd}`;

    if (selectedDate && selectedDate < todayStr) {
      showMessage("Não podes marcar um horário no passado.", "error");
      return;
    }

    if (!selectedSlot) {
      showMessage(t("validation_select_slot", "Escolhe um horário."), "error");
      return;
    }

    if (!customerName || !customerEmail) {
      showMessage(t("validation_fill_name_email", "Preenche nome e email."), "error");
      return;
    }

    bookBtn.disabled = true;
    setButtonText(bookBtn, "loading_book_button", "A confirmar marcação...");
    
    if (!providerId) {
      showMessage(t("validation_select_provider", "Escolhe um prestador."), "error");
      return;
    } 

    const payload = {
      tenant_key: tenantKey,
      provider_id: providerId,
      service_id: serviceId,
      start_at: selectedSlot,
      customer_name: customerName,
      customer_email: customerEmail
    };

    try {
      const res = await fetch(`${API_BASE}/public/book`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.detail || t("error_create_booking", "Erro ao criar marcação."), "error");
        return;
      }

      const manageUrl = `${window.location.origin}/manage.html?token=${encodeURIComponent(data.public_token)}`;
      messageDiv.className = "message success";
      const manageBookingText = publicConfig?.texts?.manage_booking_link || "Gerir marcação";

      messageDiv.innerHTML = `
        <div>${publicConfig?.success_message || "Marcação criada com sucesso. Verifica o teu email para o convite."}</div>
        <div style="margin-top: 10px;">
          <a href="${manageUrl}" style="color: inherit; font-weight: bold; text-decoration: underline;">
            ${manageBookingText}
          </a>
        </div>
      `;
      clearSlots();
      nameInput.value = "";
      emailInput.value = "";
    } catch (error) {
      showMessage(t("error_server_create_booking", "Erro de ligação ao servidor ao criar marcação."), "error");
    } finally {
      bookBtn.disabled = false;
      setButtonText(bookBtn, "book_button", "Confirmar marcação");
    }
  }

  dateInput.addEventListener("change", () => {
    clearSlots();
    clearMessage();
  });

  providerSelect.addEventListener("change", async () => {
    clearSlots();
    clearMessage();
    await loadServices();
  });
  serviceSelect.addEventListener("change", () => {
    clearSlots();
    clearMessage();
  });

  loadSlotsBtn.addEventListener("click", loadAvailability);
  bookBtn.addEventListener("click", bookAppointment);

  async function initPage() {
    try {
      setTodayAsMinDate();
      await loadConfig();
      await loadProviders();

      serviceSelect.innerHTML = "";
      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = "Escolhe primeiro um prestador";
      serviceSelect.appendChild(defaultOption);
    } catch (error) {
      showMessage(t("error_load_page", "Erro ao carregar a página de marcação."), "error");
      console.error(error);
    }
  }

initPage();
</script>
  </div>
</div>
</body>
</html>

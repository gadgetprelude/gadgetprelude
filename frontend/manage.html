<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerir marcação</title>
  <style>
    :root {
      --brand-color: #2563eb;
      --bg-soft: #fcfcfd;
      --accent-gold: #c5a059;
      --text-dark: #2d3436;
      --soft-input-bg: #f8f9fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    .hero p {
      margin: 0;
      color: #6b7280;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .detail-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
    }

    .detail-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .detail-value {
      font-size: 16px;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .cancel-btn {
      background: #dc2626;
      color: white;
    }

    .cancel-btn:hover {
      background: #b91c1c;
    }

    .secondary-btn {
      background: var(--brand-color);
      color: white;
    }

    .secondary-btn:hover {
      opacity: 0.92;
    }

    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      font-weight: 600;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 720px) {
      .page {
        margin: 20px auto;
        padding: 16px;
      }

      .details {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 24px;
      }
    }
    /* TEMPLATE 2 */
    body.template-2 {
      background: var(--bg-soft);
      color: var(--text-dark);
    }

    body.template-2 .page {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 28px 20px;
    }

    body.template-2 .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    body.template-2 .hero h1 {
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    body.template-2 .hero p {
      color: #636e72;
      font-size: 0.95rem;
    }

    body.template-2 .card {
      background: #ffffff;
      border-radius: 40px;
      padding: 18px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.08);
    }

    body.template-2 .details {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    body.template-2 .detail-box {
      background: var(--soft-input-bg);
      border: none;
      border-radius: 28px;
      padding: 16px 18px;
    }

    body.template-2 .detail-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b2bec3;
      margin-bottom: 8px;
    }

    body.template-2 .detail-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    body.template-2 input,
    body.template-2 select {
      width: 100%;
      padding: 18px 22px;
      border: none;
      background: var(--soft-input-bg);
      border-radius: 30px;
      font-size: 1rem;
      color: var(--text-dark);
    }

    body.template-2 input:focus,
    body.template-2 select:focus {
      outline: none;
      background: #fff;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    body.template-2 .actions {
      gap: 10px;
      margin-top: 16px;
    }

    body.template-2 button {
      width: 100%;
      padding: 16px 18px;
      border-radius: 35px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
    }

    body.template-2 .secondary-btn {
      background: var(--text-dark);
      color: #fff;
      box-shadow: 0 15px 30px rgba(0,0,0,0.18);
    }

    body.template-2 .secondary-btn:hover {
      background: var(--accent-gold);
      opacity: 1;
    }

    body.template-2 .cancel-btn {
      background: #ef4444;
      color: #fff;
    }

    body.template-2 .cancel-btn:hover {
      background: #dc2626;
    }

    @media (max-width: 720px) {
      body.template-2 .page {
        padding: 20px 16px;
      }

      body.template-2 .card {
        padding: 16px;
        border-radius: 32px;
      }
    }
    /* Template3 */
    body.template-3 {
      background: #f8fafc;
      color: #1e293b;
    }

    body.template-3 .page {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 20px;
    }

    body.template-3 .hero {
      text-align: center;
      margin-bottom: 18px;
    }

    body.template-3 .hero h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.6px;
      margin-bottom: 8px;
    }

    body.template-3 .hero p {
      font-size: 0.95rem;
      color: #64748b;
    }

    body.template-3 .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
    }

    body.template-3 label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      color: #64748b;
    }

    body.template-3 input,
    body.template-3 select {
      padding: 12px 0;
      border: none;
      border-bottom: 2px solid #e2e8f0;
      border-radius: 0;
      background: transparent;
      color: #0f172a;
      font-weight: 600;
    }

    body.template-3 button {
      border-radius: 16px;
      padding: 18px;
      font-weight: 700;
    }

    body.template-3 .primary-btn {
      background: #0f172a;
      color: white;
    }

    body.template-3 .danger-btn {
      background: #fff;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    /* Template 4 */
    body.template-4 {
      background: #A3E635;
      color: #000;
    }

    body.template-4 .page {
      max-width: 500px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    body.template-4 .hero {
      text-align: left;
      margin-bottom: 22px;
    }

    body.template-4 .hero h1 {
      font-size: 2.5rem;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #000;
    }

    body.template-4 .hero p {
      color: #111827;
      font-weight: 600;
    }

    body.template-4 .card {
      background: #fff;
      border: 3px solid #000;
      border-radius: 0;
      padding: 32px;
      box-shadow: 10px 10px 0 #000;
    }

    body.template-4 label {
      font-weight: 800;
      font-size: 1rem;
      color: #000;
    }

    body.template-4 input,
    body.template-4 select {
      border: 3px solid #000;
      border-radius: 0;
      background: #fff;
      color: #000;
      padding: 15px;
      font-weight: 700;
    }

    body.template-4 button {
      border-radius: 0;
      background: #000;
      color: #fff;
      font-size: 1.05rem;
      text-transform: uppercase;
      font-weight: 800;
      padding: 18px;
    }

    body.template-4 button:hover {
      background: #111;
    }

    body.template-4 .slot-btn {
      border: 3px solid #000;
      border-radius: 0;
      background: #fff;
      color: #000;
      font-weight: 800;
    }

    body.template-4 .slot-btn.selected {
      background: #000;
      color: #fff;
    }

    body.template-4 .danger-btn {
      background: #fff;
      color: #000;
      border: 3px solid #000;
    }
    /* Template 5 */
    body.template-5 {
      background: #ffffff;
      color: #000000;
    }

    body.template-5 .page {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 20px;
    }

    body.template-5 .hero {
      text-align: left;
      margin-bottom: 42px;
    }

    body.template-5 .hero h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -1.5px;
      margin-bottom: 10px;
      color: #000;
    }

    body.template-5 .hero p {
      color: #888888;
      font-size: 0.95rem;
    }

    body.template-5 .card {
      background: transparent;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }

    body.template-5 label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888888;
      font-weight: 700;
    }

    body.template-5 input,
    body.template-5 select {
      border: none;
      border-bottom: 1px solid #efefef;
      border-radius: 0;
      background: transparent;
      padding: 10px 0 15px 0;
      font-size: 1.05rem;
      color: #000;
    }

    body.template-5 button {
      border-radius: 4px;
    }

    body.template-5 .primary-btn {
      background: #000;
      color: white;
    }

    body.template-5 .danger-btn {
      background: #fff;
      color: #000;
      border: 1px solid #efefef;
    }

    body.template-5 .slot-btn {
      border: 1px solid #efefef;
      border-radius: 4px;
      background: #fff;
      color: #000;
    }

    body.template-5 .slot-btn.selected {
      background: #000;
      color: #fff;
      border-color: #000;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1 id="pageTitle">Gerir marcação</h1>
      <p id="pageSubtitle">Consulta os detalhes da tua marcação e gere-a sem login.</p>
    </div>
    <div class="card" id="manageCard">
      <div id="bookingDetails" class="details hidden">
        <div class="detail-box">
          <div class="detail-label" id="customerLabel">Cliente</div>
          <div class="detail-value" id="customerName">-</div>
        </div>

        <div class="detail-box">
          <div class="detail-label" id="manageEmailLabel">Email</div>
          <div class="detail-value" id="customerEmail">-</div>
        </div>

        <div class="detail-box">
          <div class="detail-label" id="manageServiceLabel">Serviço</div>
          <div class="detail-value" id="serviceName">-</div>
        </div>

        <div class="detail-box">
          <div class="detail-label" id="manageProviderLabel">Prestador</div>
          <div class="detail-value" id="providerName">-</div>
        </div>

        <div class="detail-box">
          <div class="detail-label" id="startAtLabel">Início</div>
          <div class="detail-value" id="startAt">-</div>
        </div>

        <div class="detail-box">
          <div class="detail-label" id="statusLabel">Estado</div>
          <div class="detail-value" id="status">-</div>
        </div>
      </div>

      <div class="actions">
        <button id="cancelBtn" class="cancel-btn hidden">Cancelar marcação</button>
        <button id="showRescheduleBtn" class="secondary-btn hidden">Reagendar marcação</button>
      </div>

      <div id="rescheduleSection" class="hidden" style="margin-top: 24px;">
        <div class="details" style="grid-template-columns: 1fr;">
          <div class="detail-box">
            <div class="detail-label" id="newDateLabel">Nova data</div>
            <input type="date" id="newDate" />
          </div>
        </div>

        <div class="actions" style="margin-top: 12px;">
          <button id="loadSlotsBtn" class="secondary-btn">Ver horários disponíveis</button>
        </div>

        <div id="slotsContainer" class="details" style="margin-top: 16px;"></div>

        <div class="actions" style="margin-top: 16px;">
          <button id="confirmRescheduleBtn" class="secondary-btn hidden">Confirmar reagendamento</button>
        </div>
      </div>

      <div id="message"></div>
    </div>
  </div>

  <script>
    const bookingDetails = document.getElementById("bookingDetails");
    const customerNameEl = document.getElementById("customerName");
    const customerEmailEl = document.getElementById("customerEmail");
    const serviceNameEl = document.getElementById("serviceName");
    const providerNameEl = document.getElementById("providerName");
    const startAtEl = document.getElementById("startAt");
    const statusEl = document.getElementById("status");
    const cancelBtn = document.getElementById("cancelBtn");
    const messageDiv = document.getElementById("message");

    const showRescheduleBtn = document.getElementById("showRescheduleBtn");
    const rescheduleSection = document.getElementById("rescheduleSection");
    const newDateInput = document.getElementById("newDate");
    const loadSlotsBtn = document.getElementById("loadSlotsBtn");
    const slotsContainer = document.getElementById("slotsContainer");
    const confirmRescheduleBtn = document.getElementById("confirmRescheduleBtn");

    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");
    const manageCard = document.getElementById("manageCard");

    const customerLabel = document.getElementById("customerLabel");
    const manageEmailLabel = document.getElementById("manageEmailLabel");
    const manageServiceLabel = document.getElementById("manageServiceLabel");
    const manageProviderLabel = document.getElementById("manageProviderLabel");
    const startAtLabel = document.getElementById("startAtLabel");
    const statusLabelEl = document.getElementById("statusLabel");
    const newDateLabel = document.getElementById("newDateLabel");

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const previewMode = params.get("preview") === "1";
    const previewTenantKey = params.get("tenant_key") || "default";

    let bookingData = null;
    let selectedNewSlot = null;
    let publicConfig = null;

    function t(key, fallback) {
      return publicConfig?.texts?.[key] || fallback;
    }

    function applyTemplateStyles(templateKey) {
      document.body.classList.remove(
        "template-default",
        "template-2",
        "template-3",
        "template-4",
        "template-5"
      );

      switch (templateKey) {
        case "template_2":
          document.body.classList.add("template-2");
          break;
        case "template_3":
          document.body.classList.add("template-3");
          break;
        case "template_4":
          document.body.classList.add("template-4");
          break;
        case "template_5":
          document.body.classList.add("template-5");
          break;
        default:
          document.body.classList.add("template-default");
          break;
      }
    }

    function setButtonText(button, textKey, fallback) {
      if (!button) return;
      button.textContent = t(textKey, fallback);
    }

    function getApiBase() {
      const host = window.location.hostname;

      if (host === "127.0.0.1" || host === "localhost") {
        return "http://127.0.0.1:8000";
      }

      return "https://gadgetprelude.onrender.com";
    }

    const API_BASE = getApiBase();

    function showMessage(text, type) {
      messageDiv.className = `message ${type}`;
      messageDiv.textContent = text;
    }

    function clearMessage() {
      messageDiv.className = "";
      messageDiv.textContent = "";
    }

    function formatDateTime(isoString) {
      if (!isoString) return "-";
      const dt = new Date(isoString);
      return dt.toLocaleString("pt-PT", {
        dateStyle: "short",
        timeStyle: "short"
      });
    }

    async function loadConfig(tenantKey) {
      const res = await fetch(`${API_BASE}/public/config?tenant_key=${encodeURIComponent(tenantKey)}`);
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || "Erro ao carregar configuração pública.");
      }

      publicConfig = data;
      const texts = data.texts || {};

      applyTemplateStyles(data.template_key || "default");

      if (data.business_name) {
        document.title = texts.manage_page_title
          ? `${texts.manage_page_title} - ${data.business_name}`
          : `Gerir marcação - ${data.business_name}`;
      }

      pageTitle.textContent = texts.manage_page_title || "Gerir marcação";
      pageSubtitle.textContent = texts.manage_page_subtitle || "Consulta os detalhes da tua marcação e gere-a sem login.";

      customerLabel.textContent = texts.customer_label || "Cliente";
      manageEmailLabel.textContent = texts.manage_email_label || "Email";
      manageServiceLabel.textContent = texts.manage_service_label || "Serviço";
      manageProviderLabel.textContent = texts.manage_provider_label || "Prestador";
      startAtLabel.textContent = texts.start_at_label || "Início";
      statusLabelEl.textContent = texts.status_label || "Estado";
      newDateLabel.textContent = texts.new_date_label || "Nova data";

      setButtonText(cancelBtn, "cancel_button", "Cancelar marcação");
      setButtonText(showRescheduleBtn, "show_reschedule_button", "Reagendar marcação");
      setButtonText(loadSlotsBtn, "load_slots_button", "Ver horários disponíveis");
      setButtonText(confirmRescheduleBtn, "confirm_reschedule_button", "Confirmar reagendamento");

      if (data.primary_color) {
        document.documentElement.style.setProperty("--brand-color", data.primary_color);
      }

      if (data.background_color) {
        document.body.style.background = data.background_color;
      }

      if (data.text_color) {
        document.body.style.color = data.text_color;
      }

      if (data.card_background_color && manageCard) {
        manageCard.style.background = data.card_background_color;
      }
    }

    function loadPreviewBookingData() {
      bookingData = {
        tenant_key: previewTenantKey,
        customer_name: "Cliente Exemplo",
        customer_email: "cliente@example.com",
        service_name: "Corte de Cabelo",
        provider_name: "Ricardo Fernandes",
        start_at: new Date().toISOString(),
        status: "confirmada"
      };

      customerNameEl.textContent = bookingData.customer_name;
      customerEmailEl.textContent = bookingData.customer_email;
      serviceNameEl.textContent = bookingData.service_name;
      providerNameEl.textContent = bookingData.provider_name;
      startAtEl.textContent = formatDateTime(bookingData.start_at);
      statusEl.textContent = bookingData.status;

      bookingDetails.classList.remove("hidden");
      cancelBtn.classList.remove("hidden");
      showRescheduleBtn.classList.remove("hidden");

      cancelBtn.disabled = true;
      confirmRescheduleBtn.disabled = true;
      loadSlotsBtn.disabled = false;
    }

    async function loadBooking() {
      clearMessage();

      if (!token && !previewMode) {
        showMessage("Token em falta.", "error");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/public/booking-by-token?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        bookingData = data;

        if (!res.ok) {
          showMessage(data.detail || t("error_load_booking", "Não foi possível encontrar a marcação."), "error");
          return;
        }

        await loadConfig(data.tenant_key);

        customerNameEl.textContent = data.customer_name || "-";
        customerEmailEl.textContent = data.customer_email || "-";
        serviceNameEl.textContent = data.service_name || "-";
        providerNameEl.textContent = data.provider_name || "-";
        startAtEl.textContent = formatDateTime(data.start_at);
        statusEl.textContent = data.status || "-";

        bookingDetails.classList.remove("hidden");

        if (data.status !== "cancelled") {
          cancelBtn.classList.remove("hidden");
          showRescheduleBtn.classList.remove("hidden");
        }
      } catch (error) {
        showMessage(t("error_load_booking", "Erro ao carregar a marcação."), "error");
      }
    }

    async function cancelBooking() {
      clearMessage();

      if (previewMode) {
        showMessage("Preview mode ativo. Ações reais estão desativadas.", "success");
        return;
      }

      const confirmed = window.confirm(
        t("cancel_confirm_text", "Tens a certeza que queres cancelar esta marcação?")
      );

      if (!confirmed) return;

      try {
        cancelBtn.disabled = true;
        setButtonText(cancelBtn, "loading_cancel_button", "A cancelar...");

        const res = await fetch(`${API_BASE}/public/cancel-by-token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.detail || t("error_server_cancel_booking", "Erro ao cancelar marcação."), "error");
          return;
        }

        statusEl.textContent = "cancelled";
        cancelBtn.classList.add("hidden");
        showRescheduleBtn.classList.add("hidden");
        rescheduleSection.classList.add("hidden");

        showMessage(t("success_cancel_booking", "Marcação cancelada com sucesso."), "success");
      } catch (error) {
        showMessage(t("error_server_cancel_booking", "Erro de ligação ao servidor ao cancelar marcação."), "error");
      } finally {
        cancelBtn.disabled = false;
        setButtonText(cancelBtn, "cancel_button", "Cancelar marcação");
      }
    }

    function clearRescheduleSlots() {
      slotsContainer.innerHTML = "";
      selectedNewSlot = null;
      confirmRescheduleBtn.classList.add("hidden");
    }

    async function loadRescheduleAvailability() {
      clearMessage();
      clearRescheduleSlots();

      const dateStr = newDateInput.value;
      if (!dateStr) {
        showMessage(t("validation_select_new_date", "Escolhe uma nova data."), "error");
        return;
      }

      if (previewMode) {
        const mockSlots = [
          `${dateStr}T10:00:00`,
          `${dateStr}T11:00:00`,
          `${dateStr}T14:30:00`,
          `${dateStr}T16:00:00`
        ];

        mockSlots.forEach(slot => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "secondary-btn";
          btn.style.background = "#ffffff";
          btn.style.color = "#111827";
          btn.style.border = "1px solid #cbd5e1";
          btn.style.textAlign = "left";

          const dt = new Date(slot);
          btn.textContent = dt.toLocaleTimeString("pt-PT", {
            hour: "2-digit",
            minute: "2-digit"
          });

          btn.addEventListener("click", () => {
            document.querySelectorAll("#slotsContainer button").forEach(b => {
              b.style.background = "#ffffff";
              b.style.color = "#111827";
              b.style.border = "1px solid #cbd5e1";
            });

            btn.style.background = "var(--brand-color)";
            btn.style.color = "#ffffff";
            btn.style.border = "1px solid var(--brand-color)";

            selectedNewSlot = slot;
            confirmRescheduleBtn.classList.remove("hidden");
          });

          slotsContainer.appendChild(btn);
        });

        return;
      }

      try {
        loadSlotsBtn.disabled = true;
        setButtonText(loadSlotsBtn, "loading_slots_button", "A carregar horários...");

        const url = `${API_BASE}/public/availability?tenant_key=${encodeURIComponent(bookingData.tenant_key)}&service_id=${bookingData.service_id}&provider_id=${bookingData.provider_id}&date=${encodeURIComponent(dateStr)}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!res.ok) {
          showMessage(data.detail || t("error_load_slots", "Erro ao carregar horários."), "error");
          return;
        }

        if (!data.slots || data.slots.length === 0) {
          showMessage(t("error_load_slots", "Erro ao carregar horários."), "error");
          return;
        }

        data.slots.forEach(slot => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "secondary-btn";

          const dt = new Date(slot);
          btn.textContent = dt.toLocaleTimeString("pt-PT", {
            hour: "2-digit",
            minute: "2-digit"
          });

          btn.addEventListener("click", () => {
            document.querySelectorAll("#slotsContainer button").forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
            selectedNewSlot = slot;
            confirmRescheduleBtn.classList.remove("hidden");
          });

          slotsContainer.appendChild(btn);
        });
      } catch (error) {
        showMessage(t("error_load_slots", "Erro ao carregar horários."), "error");
      } finally {
        loadSlotsBtn.disabled = false;
        setButtonText(loadSlotsBtn, "load_slots_button", "Ver horários disponíveis");
      }
    }

    async function confirmReschedule() {
      clearMessage();

      if (previewMode) {
        showMessage("Preview mode ativo. Ações reais estão desativadas.", "success");
        return;
      }

      if (!selectedNewSlot) {
        showMessage(t("validation_select_new_slot", "Escolhe um novo horário."), "error");
        return;
      }

      try {
        confirmRescheduleBtn.disabled = true;
        setButtonText(confirmRescheduleBtn, "loading_reschedule_button", "A reagendar...");

        const res = await fetch(`${API_BASE}/public/reschedule-by-token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token,
            new_start_at: selectedNewSlot
          })
        });

        const data = await res.json();

        if (!res.ok) {
          showMessage(data.detail || t("error_server_reschedule_booking", "Erro ao reagendar marcação."), "error");
          return;
        }

        startAtEl.textContent = formatDateTime(selectedNewSlot);
        statusEl.textContent = "rescheduled";
        rescheduleSection.classList.add("hidden");
        clearRescheduleSlots();

        showMessage(t("success_reschedule_booking", "Marcação reagendada com sucesso."), "success");
      } catch (error) {
        showMessage(t("error_server_reschedule_booking", "Erro de ligação ao servidor ao reagendar marcação."), "error");
      } finally {
        confirmRescheduleBtn.disabled = false;
        setButtonText(confirmRescheduleBtn, "confirm_reschedule_button", "Confirmar reagendamento");
      }
    }

    showRescheduleBtn.addEventListener("click", () => {
      rescheduleSection.classList.toggle("hidden");
      clearRescheduleSlots();
    });

    cancelBtn.addEventListener("click", cancelBooking);
    loadSlotsBtn.addEventListener("click", loadRescheduleAvailability);
    confirmRescheduleBtn.addEventListener("click", confirmReschedule);

    (async function init() {
      if (previewMode) {
        try {
          await loadConfig(previewTenantKey);
          loadPreviewBookingData();
          showMessage("Preview mode ativo.", "success");
        } catch (error) {
          showMessage(t("error_load_page", "Erro ao carregar a página de marcação."), "error");
        }
        return;
      }

      loadBooking();
    })();
  </script>
</body>
</html>

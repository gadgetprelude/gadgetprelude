services:
  db:
    image: postgres:16
    container_name: gp_db
    environment:
      POSTGRES_USER: gp
      POSTGRES_PASSWORD: gp
      POSTGRES_DB: gadgetprelude
    ports:
      - "5432:5432"
    volumes:
      - gp_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gp_redis
    ports:
      - "6379:6379"

volumes:
  gp_pgdata:
